services:
  frontend:
    build: ./front
    container_name: front
    ports:
      - "8444:80"
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build: ./back
    container_name: api
    ports:
      - "3000:3000"
    restart: unless-stopped
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5436:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: